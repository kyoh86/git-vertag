# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Publish Docker image
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish as a Docker image.
        required: true
        type: string
permissions:
  contents: read
  packages: write
jobs:
  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Check tag
        shell: bash
        run: |
          if [[ ! "${{ github.event.inputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag: ${{ github.event.inputs.tag }}" >&2
            exit 1
          fi
      - name: Checkout Sources
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=A tool to manage version-tag with the semantic versioning specification.
            org.opencontainers.image.licenses=MIT
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.event.inputs.tag }}
